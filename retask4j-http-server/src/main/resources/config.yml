retask4j:
  http:
    redis:
      # redis地址，如果是分布式部署，请修改为redis地址
      redisson:
        singleServerConfig:
          address: "redis://localhost:6379"
          database: 0
          #clientName:
          #password:
          idleConnectionTimeout: 10000
          connectTimeout: 10000
          timeout: 60000
          retryAttempts: 3
          retryInterval: 1500
          subscriptionsPerConnection: 5
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 50
          connectionMinimumIdleSize: 8
          connectionPoolSize: 16
          dnsMonitoringInterval: 5000
        threads: 0
        nettyThreads: 0

    callers:
        # 主题
      - topic: "proxy"
        # 请求地址
        path: "/proxy/push"
        # 模式 NORMAL/FUNCTION/CALLBACK
        mode: "NORMAL"
        #重试策略 (秒) 如[1,3]. 1秒后重试，3秒后重试, 默认不重试
        retry-plan: [5,20,60,120,300]
        #消费过期时间s，默认1一天
        execute-expire: 86400
        #结果缓存时间s
        result-expire: 60
        #请求超时时间s
        request-timeout: 90

        # 主题
      - topic: "proxy"
        # 请求地址
        path: "/proxy/call"
        # 模式 NORMAL/FUNCTION/CALLBACK
        mode: "FUNCTION"
        retry-plan: [2,5]
        #消费过期时间s，默认1一天
        execute-expire: 86400
        #结果缓存时间s
        result-expire: 60
        #请求超时时间s
        request-timeout: 90

        # 主题
      - topic: "proxy"
        # 请求地址
        path: "/proxy/task"
        # 模式 NORMAL/FUNCTION/CALLBACK
        mode: "CALLBACK"
        #重试策略 (秒) 如[1,3]. 1秒后重试，3秒后重试, 默认不重试
        retry-plan: [60,120,300,600,3600]
        #消费过期时间s，默认1一天
        execute-expire: 86400
        #结果缓存时间s，1小时
        result-expire: 3600
        #请求超时时间，默认120s
        request-timeout: 120
        # 默认回调地址
        callback-url: "http://localhost:9400/debug/request.info"
        #回调重试次数，默认3次
        callback-retry-times: 3
        #回调重试间隔，默认60s
        callback-retry-interval: 60

    workers:
      - topic: "proxy"
        maxConsumeThreads: 512
        routes:
            # 路由正则匹配
          - path: "http://www\\.baidu\\.com/(.+)"
            # 重写url, 为空则不重写
            redirect: "https://www.baidu.com/&1"
            # 重写请求头
            rewrite-request-headers:
               "my-token1": Null
               "my-token2": "123"

            # 断言响应，不匹配则断言http失败，可以进入重试。
            assert-response:
              #为空不限,如：[200,301,302,304,403,404]
              statusIn: []
              #响应头必须匹配 ”{key}“: ”{正则表达式}“, 多个时都需匹配
              headerMatch:
                "Content-Type": "application/json(;charset=.+)?"
              #响应body（text） 必须匹配正则表达式, 如 "success|SUCCESS|Success|Ok|ok|OK|true|TRUE|True"
              textBodyMatch:
              #响应body（json） 必须匹配 ”{jsonpath}“: ”{正则表达式}“, 多个时都需匹配
              jsonPathMatch:
                "$.code": "0"
                "$.msg": "success"

            # 重写响应头
            rewrite-response-headers:
              "Access-Control-Allow-Origin": "*"
              "Timing-Allow-Origin": "*"
              # "my-token": "123"
              # "etag": null

          # default route config
          - path: "*"
            # 重写响应头
            rewrite-response-headers:
              "Access-Control-Allow-Origin": "*"
              "Access-Control-Max-Age": "86400"
              "Timing-Allow-Origin": "*"